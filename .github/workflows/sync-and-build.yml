name: Sync Upstream & Build

on:
  schedule:
    - cron: '*/30 * * * *'  # Check every 30 minutes
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: git remote add upstream https://github.com/gsd-build/gsd-2.git || true
      
      - name: Fetch upstream
        run: git fetch upstream main
      
      - name: Check if upstream is ahead
        id: check
        run: |
          COMMITS_AHEAD=$(git rev-list --count main..upstream/main)
          echo "commits_ahead=$COMMITS_AHEAD" >> $GITHUB_OUTPUT
          if [ "$COMMITS_AHEAD" -gt 0 ]; then
            echo "Upstream is $COMMITS_AHEAD commits ahead"
            exit 0
          else
            echo "Fork is up to date with upstream"
            exit 0
          fi
      
      - name: Merge upstream into main
        if: steps.check.outputs.commits_ahead > 0
        run: |
          git checkout main
          git merge upstream/main --no-edit -m "chore: sync from upstream (auto)"
      
      - name: Push to fork
        if: steps.check.outputs.commits_ahead > 0
        run: git push origin main
